version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/app.db
    command: uvicorn fastapi_app:app --host 0.0.0.0 --port 8000 --reload

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: code-sandbox:latest
    profiles:
      - buildonly

networks:
  default:
    name: smart hire-network